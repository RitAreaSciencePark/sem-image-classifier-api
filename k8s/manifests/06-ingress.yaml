# Ingress routing for external traffic to KrakenD.
# Development usually uses port-forward; this is primarily for ingress-based environments.
# Single catch-all path keeps gateway as the only public entrypoint.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: ingress
spec:
  # K3s default ingress class.
  ingressClassName: traefik

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: krakend
                port:
                  number: 8080
