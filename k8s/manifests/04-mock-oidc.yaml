# Development-only mock OIDC provider.
# Not intended for production authentication.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oidc
  labels:
    app.kubernetes.io/name: mock-oidc
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-oidc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-oidc
        app.kubernetes.io/component: auth
    spec:
      containers:
        - name: mock-oidc
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Keep token flow fully API-driven for automated tests.
            - name: JSON_CONFIG
              value: '{"interactiveLogin":false}'
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /default/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /default/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mock-oidc
  labels:
    app.kubernetes.io/name: mock-oidc
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: mock-oidc
