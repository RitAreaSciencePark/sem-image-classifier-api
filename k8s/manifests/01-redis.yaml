# Redis StatefulSet with primary/replica topology.

apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: queue
spec:
  # Headless service gives stable DNS names (redis-0.redis..., redis-1.redis...).
  clusterIP: None
  ports:
    - port: 6379
      name: redis
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: queue
spec:
  serviceName: redis
  # One writable primary + one replica for failover-oriented redundancy.
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: redis

  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: queue
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: redis
              containerPort: 6379

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD

          # redis-0 runs as primary; other replicas follow redis-0.
          command:
            - /bin/sh
            - -c
            - |
              if [ "$(hostname)" = "redis-0" ]; then
                echo "Starting as MASTER"
                exec redis-server \
                  --requirepass "$REDIS_PASSWORD" \
                  # Keep masterauth set on primary too so promotion/demotion stays symmetric.
                  --masterauth "$REDIS_PASSWORD" \
                  --appendonly yes \
                  --appendfsync everysec \
                  --maxmemory 512mb \
                  --maxmemory-policy allkeys-lru
              else
                echo "Starting as REPLICA of redis-0"
                exec redis-server \
                  --requirepass "$REDIS_PASSWORD" \
                  --masterauth "$REDIS_PASSWORD" \
                  --replicaof redis-0.redis 6379 \
                  --appendonly yes \
                  --appendfsync everysec \
                  --maxmemory 512mb \
                  --maxmemory-policy allkeys-lru
              fi

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          volumeMounts:
            - name: redis-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

---
# Allow one Redis pod disruption at a time.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
