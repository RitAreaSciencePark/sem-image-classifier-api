# BentoML inference deployment and service.
# Probes use BentoML framework endpoints: /livez and /readyz.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bentoml
  labels:
    app.kubernetes.io/name: bentoml
    app.kubernetes.io/component: inference
spec:
  # Replicas are managed by the HPA.

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app.kubernetes.io/name: bentoml

  template:
    metadata:
      labels:
        app.kubernetes.io/name: bentoml
        app.kubernetes.io/component: inference
    spec:
      terminationGracePeriodSeconds: 30

      # Optional anti-affinity for multi-replica scheduling.
      # affinity:
      #   podAntiAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 100
      #         podAffinityTerm:
      #           labelSelector:
      #             matchExpressions:
      #               - key: app.kubernetes.io/name
      #                 operator: In
      #                 values: ["bentoml"]
      #           topologyKey: kubernetes.io/hostname

      containers:
        - name: bentoml
          image: localhost:5000/sem-image-classifier:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000

          envFrom:
            - configMapRef:
                name: bentoml-config

          # Override auto-injected service env var format (tcp://...) with raw port.
          env:
            - name: BENTOML_PORT
              value: "3000"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # Startup probe guards against false restarts during model load.
          startupProbe:
            httpGet:
              path: /livez
              port: 3000
            periodSeconds: 5
            failureThreshold: 60

          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
# Internal service for KrakenD -> BentoML traffic.
apiVersion: v1
kind: Service
metadata:
  name: bentoml
  labels:
    app.kubernetes.io/name: bentoml
    app.kubernetes.io/component: inference
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: bentoml

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bentoml-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bentoml
